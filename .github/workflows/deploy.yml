# Tarvyo24 – Build & Deployment (statischer Export → Hostinger via FTPS)
#
# SICHERHEITSKONZEPT:
# - Bei jedem Push auf main läuft NUR der Build (CI-Prüfung + Artefakt).
# - Das Deployment läuft AUSSCHLIESSLICH bei manuellem Start
#   (Actions → "Deploy Tarvyo24" → "Run workflow"). So kann kein Push
#   versehentlich live gehen, solange die Go-Live-Blocker offen sind
#   (siehe PROJEKTPLAN.md: Impressum, Datenschutz, noindex-Review, Postfach).
# - Nach dem Go-Live kann auf Auto-Deploy umgestellt werden: dazu unten im
#   deploy-Job die if-Zeile entfernen bzw. durch
#   "if: github.ref == 'refs/heads/main'" ersetzen.
#
# BENÖTIGTE GITHUB SECRETS (Repo → Settings → Secrets and variables → Actions):
#   FTP_SERVER      Hostinger-FTP-IP (152.239.125.180); Domain-Hostname zeigt
#                   auf die Webserver und funktioniert für FTP nicht
#   FTP_USERNAME    FTP-Benutzername aus dem Hostinger-Panel
#   FTP_PASSWORD    zugehöriges Passwort
# Es sind KEINE Zugangsdaten in dieser Datei oder im Repo hinterlegt.
#
# HINWEIS server-dir: Der Hostinger-FTP-Login startet bereits IM Webroot
# (public_html). server-dir ist deshalb fest auf "./" gesetzt — das frühere
# Secret FTP_TARGET_DIR wird NICHT mehr verwendet und kann gelöscht werden
# (public_html/ als Wert erzeugte fälschlich public_html/public_html/,
# festgestellt am 06.07.2026).
#
# FTP-Action: SamKirkland/FTP-Deploy-Action — etablierte, weit verbreitete
# Action für statische FTP/FTPS-Deployments (inkrementeller Sync, kein
# Löschen per Default, braucht keine erhöhten Workflow-Rechte). Version
# ist gepinnt.

name: Deploy Tarvyo24

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (statischer Export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Statischen Export bauen
        run: npm run build

      - name: Export als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/
          retention-days: 7

  deploy:
    name: Deploy zu Hostinger (nur manuell)
    # Deployment NUR bei manuellem Start — Schutz vor versehentlichem
    # Livegang, solange Go-Live-Blocker offen sind (siehe Kopfkommentar).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Export-Artefakt laden
        uses: actions/download-artifact@v4
        with:
          name: site
          path: out

      - name: Upload per FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # security: loose — Hostinger-FTP ist nur per IP erreichbar; ein
          # TLS-Zertifikat kann gegen eine IP nie validieren. Verbindung
          # bleibt vollstaendig TLS-verschluesselt (AUTH SSL), nur die
          # Zertifikatsnamens-Pruefung entfaellt. Diagnose: 06.07.2026.
          security: loose
          local-dir: out/
          # Fest "./": FTP-Login landet bereits im Webroot (public_html) —
          # siehe Kopfkommentar. Kein Secret mehr nötig.
          server-dir: ./
