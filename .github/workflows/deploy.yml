# Tarvyo24 – Build & Deployment (statischer Export → Hostinger via FTPS)
#
# SICHERHEITSKONZEPT:
# - Bei jedem Push auf main läuft NUR der Build (CI-Prüfung + Artefakt).
# - Das Deployment läuft AUSSCHLIESSLICH bei manuellem Start
#   (Actions → "Deploy Tarvyo24" → "Run workflow"). So kann kein Push
#   versehentlich live gehen, solange die Go-Live-Blocker offen sind
#   (siehe PROJEKTPLAN.md: Impressum, Datenschutz, noindex-Review, Postfach).
# - Nach dem Go-Live kann auf Auto-Deploy umgestellt werden: dazu unten im
#   deploy-Job die if-Zeile entfernen bzw. durch
#   "if: github.ref == 'refs/heads/main'" ersetzen.
#
# BENÖTIGTE GITHUB SECRETS (Repo → Settings → Secrets and variables → Actions):
#   FTP_SERVER      Hostinger-FTP-IP (152.239.125.180); Domain-Hostname zeigt
#                   auf die Webserver und funktioniert für FTP nicht
#   FTP_USERNAME    FTP-Benutzername aus dem Hostinger-Panel
#   FTP_PASSWORD    zugehöriges Passwort
# Es sind KEINE Zugangsdaten in dieser Datei oder im Repo hinterlegt.
#
# HINWEIS server-dir: Der Hostinger-FTP-Login startet bereits IM Webroot
# (public_html). server-dir ist deshalb fest auf "./" gesetzt — das frühere
# Secret FTP_TARGET_DIR wird NICHT mehr verwendet und kann gelöscht werden
# (public_html/ als Wert erzeugte fälschlich public_html/public_html/,
# festgestellt am 06.07.2026).
#
# FTP-Action: SamKirkland/FTP-Deploy-Action — etablierte, weit verbreitete
# Action für statische FTP/FTPS-Deployments (inkrementeller Sync, kein
# Löschen per Default, braucht keine erhöhten Workflow-Rechte). Version
# ist gepinnt.

name: Deploy Tarvyo24

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: >-
          Clean-Deploy: public_html KOMPLETT leeren und alles neu hochladen.
          Nur zur Reparatur nach Sync-Fehlern. Vorher ZIP-Backup im
          Hostinger-Dateimanager, danach http→https-Redirect prüfen!
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build (statischer Export)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Statischen Export bauen
        run: npm run build

      - name: Export als Artefakt sichern
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/
          retention-days: 7

  deploy:
    name: Deploy zu Hostinger (nur manuell)
    # Deployment NUR bei manuellem Start — Schutz vor versehentlichem
    # Livegang, solange Go-Live-Blocker offen sind (siehe Kopfkommentar).
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment: production
    # Obergrenze gegen hängende FTP-Verbindungen (Vorfall 06.07.2026):
    # ein kompletter Neu-Upload dauert erfahrungsgemäß < 15 Minuten.
    timeout-minutes: 30
    steps:
      - name: Export-Artefakt laden
        uses: actions/download-artifact@v4
        with:
          name: site
          path: out

      - name: Upload per FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # security: loose — Hostinger-FTP ist nur per IP erreichbar; ein
          # TLS-Zertifikat kann gegen eine IP nie validieren. Verbindung
          # bleibt vollstaendig TLS-verschluesselt (AUTH SSL), nur die
          # Zertifikatsnamens-Pruefung entfaellt. Diagnose: 06.07.2026.
          security: loose
          local-dir: out/
          # Fest "./": FTP-Login landet bereits im Webroot (public_html) —
          # siehe Kopfkommentar. Kein Secret mehr nötig.
          server-dir: ./
          # ---- Robustheit (nach 550-/Timeout-Fehlern am 06.07.2026) ----
          # 120 s statt 30 s Default: Hostinger-Shared-FTP antwortet bei
          # rekursiven Listings/vielen kleinen Dateien (_next/static) unter
          # Last langsam — der Default riss die Steuerverbindung ab
          # ("Timeout (Steuerbuchse)" = control socket timeout).
          timeout: 120000
          # Sync-State liegt NUR serverseitig (der Runner ist flüchtig).
          # v2-Name seit 06.07.2026: umgeht den durch abgebrochene Läufe
          # inkonsistenten alten State. Die alte .ftp-deploy-sync-state.json
          # in public_html kann im Dateimanager gelöscht werden (optional).
          state-name: .ftp-deploy-sync-state-v2.json
          # Volles Log je Dateioperation — macht künftige Fehler zuordenbar.
          log-level: verbose
          # ---- Zwei Modi (06.07.2026, nach anhaltenden 550-Fehlern) ----
          # Standard (Checkbox aus): inkrementeller Sync — Normalfall.
          # Clean-Deploy (Checkbox beim manuellen Start): löscht VORAB ALLE
          # Dateien unter server-dir (auch .htaccess/.well-known, falls
          # vorhanden!) und lädt alles frisch hoch. Einziger zuverlässiger
          # Weg, einen durch Teil-Uploads beschädigten _next/-Baum zu
          # reparieren — die Action kann fehlgeschlagene Einzeloperationen
          # nicht überspringen. NUR bei Sync-Fehlern verwenden; vorher
          # ZIP-Backup, danach Redirect-/Stichprobenprüfung (DEPLOYMENT.md).
          dangerous-clean-slate: ${{ inputs.clean_deploy == true }}
